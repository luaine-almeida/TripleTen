<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Dashboard Cursos — TripleTen Brasil</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8F9FB;color:#111827;min-height:100vh;padding:1.5rem}
.container{max-width:920px;margin:0 auto}
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.brand-name{font-size:15px;font-weight:600;color:#374151}
.brand-sub{font-size:12px;color:#9CA3AF;margin-top:2px}
.brand-right{display:flex;align-items:center;gap:8px}
.sync-status{font-size:11px;color:#9CA3AF;display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#D1FAE5}
.sync-dot.loading{background:#FEF3C7;animation:pulse 1s infinite}
.sync-dot.error{background:#FEE2E2}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{font-size:12px;padding:7px 14px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:#374151;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{background:#F3F4F6;border-color:#9CA3AF}
.btn.primary{background:#111827;color:#fff;border-color:#111827}
.btn.primary:hover{background:#374151}
.course-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.pill{font-size:12px;padding:6px 14px;border-radius:999px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;font-family:inherit;transition:all .15s}
.pill:hover{background:#F3F4F6}
.pill.on{font-weight:600;border-width:2px}
.course-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #F3F4F6}
.course-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:5px}
.course-name{font-size:20px;font-weight:600;color:#111827}
.course-meta{font-size:13px;color:#6B7280;margin-top:3px}
.quick-links{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-bottom:1.25rem}
.ql{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:10px 12px;text-decoration:none;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.ql:hover{border-color:#9CA3AF}
.ql-label{font-size:11px;color:#9CA3AF;display:block}
.ql-val{font-size:12px;font-weight:600}
.sections{display:flex;flex-direction:column;gap:8px}
.sec-block{background:#fff;border:1px solid #E5E7EB;border-radius:12px;overflow:hidden}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.sec-head:hover{background:#FAFAFA}
.sec-head-left{display:flex;align-items:center;gap:8px}
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.chevron{font-size:14px;color:#9CA3AF;transition:transform .2s}
.sec-body{padding:12px 16px;font-size:13px;color:#4B5563;line-height:1.65;border-top:1px solid #F3F4F6;white-space:pre-wrap;display:none}
.sec-body.open{display:block}
.proj-row{display:grid;grid-template-columns:150px 1fr;border-bottom:1px solid #F3F4F6}
.proj-row:last-child{border-bottom:none}
.proj-name{padding:10px 12px;font-size:12px;font-weight:600;border-right:1px solid #F3F4F6}
.proj-desc{padding:10px 12px;font-size:12px;color:#4B5563;line-height:1.5}
.pay-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:#9CA3AF;font-weight:600;border-bottom:1px solid #F3F4F6;font-size:11px;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #F9FAFB;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.dpill{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;white-space:nowrap}
.plink{text-decoration:none;font-size:11px;font-weight:600}
.plink:hover{text-decoration:underline}
.main-nav{display:flex;gap:4px;margin-bottom:1.5rem;background:#F3F4F6;border-radius:10px;padding:4px;width:fit-content}
.mnav{font-size:13px;padding:7px 14px;border-radius:7px;border:none;background:transparent;color:#6B7280;cursor:pointer;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .15s}
.mnav:hover{color:#111827}
.mnav.on{background:#fff;color:#111827;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.sec-hdr-title{font-size:16px;font-weight:600;color:#111827}
.cup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:1.5rem}
.cup-card{background:#fff;border:0.5px solid #E5E7EB;border-radius:12px;padding:14px 16px}
.cup-code{font-family:monospace;font-size:17px;font-weight:700;color:#111827;margin-bottom:3px}
.cup-disc{font-size:13px;font-weight:600;margin-bottom:2px}
.cup-obs{font-size:11px;color:#9CA3AF}
.ind-table{width:100%;border-collapse:collapse;font-size:13px}
.ind-table th{text-align:left;padding:8px 12px;color:#9CA3AF;font-weight:600;border-bottom:1px solid #F3F4F6;font-size:11px}
.ind-table td{padding:10px 12px;border-bottom:1px solid #F9FAFB;vertical-align:middle}
.ind-table tr:last-child td{border-bottom:none}
.ind-table tr:hover td{background:#FAFAFA}
.ind-link{color:#1D4ED8;text-decoration:none;font-size:12px;font-family:monospace}
.ind-link:hover{text-decoration:underline}
.cup-edit-row{display:grid;grid-template-columns:130px 90px 1fr 28px;gap:8px;margin-bottom:8px;align-items:center}
.cup-edit-row .field-input{font-size:12px;padding:5px 8px}
.ind-edit-row{display:grid;grid-template-columns:140px 150px 1fr 28px;gap:8px;margin-bottom:8px;align-items:center}
.ind-edit-row .field-input{font-size:12px;padding:5px 8px}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:740px;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #F3F4F6}
.modal-title{font-size:16px;font-weight:600;color:#111827}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#6B7280}
.modal-close:hover{background:#F3F4F6}
.modal-tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#F3F4F6;border-radius:10px;padding:4px}
.modal-tab{flex:1;font-size:12px;padding:6px 10px;border-radius:7px;border:none;background:transparent;color:#6B7280;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;text-align:center}
.modal-tab.on{background:#fff;color:#111827;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-panel{display:none}
.tab-panel.on{display:block}
.modal-section{margin-bottom:1.25rem}
.modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9CA3AF;margin-bottom:10px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field-row.full{grid-template-columns:1fr}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:11px;color:#6B7280;font-weight:500}
.field-input{font-size:13px;padding:7px 10px;border:1px solid #E5E7EB;border-radius:8px;font-family:inherit;color:#111827;outline:none;transition:border-color .15s;width:100%}
.field-input:focus{border-color:#9CA3AF}
.field-textarea{font-size:13px;padding:7px 10px;border:1px solid #E5E7EB;border-radius:8px;font-family:inherit;color:#111827;outline:none;transition:border-color .15s;width:100%;resize:vertical;min-height:90px;line-height:1.5}
.field-textarea:focus{border-color:#9CA3AF}
.pay-edit-row{display:grid;grid-template-columns:80px 1fr 100px 1fr 28px;gap:6px;margin-bottom:6px;align-items:center}
.pay-edit-row .field-input{font-size:12px;padding:5px 8px}
.btn-remove{width:26px;height:26px;border-radius:6px;border:1px solid #FEE2E2;background:#FEF2F2;color:#B91C1C;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.btn-remove:hover{background:#FEE2E2}
.btn-add-row{font-size:12px;padding:6px 12px;border-radius:7px;border:1px dashed #D1D5DB;background:transparent;color:#6B7280;cursor:pointer;font-family:inherit;margin-top:4px;width:100%}
.btn-add-row:hover{background:#F9FAFB;border-color:#9CA3AF}
.proj-edit-row{display:grid;grid-template-columns:140px 1fr 28px;gap:6px;margin-bottom:6px;align-items:start}
.proj-edit-row .field-input,.proj-edit-row .field-textarea{font-size:12px;padding:5px 8px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding-top:1rem;border-top:1px solid #F3F4F6;margin-top:1rem}
.toast{position:fixed;bottom:24px;right:24px;background:#111827;color:#fff;font-size:13px;padding:10px 16px;border-radius:10px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:6px}
.toast.show{opacity:1}
.last-updated{font-size:11px;color:#9CA3AF;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div>
      <div class="brand-name">TripleTen Brasil</div>
      <div class="brand-sub">Dashboard de Cursos — Closers e SDRs</div>
    </div>
    <div class="brand-right">
      <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Sincronizado</span></div>
      <button class="btn" onclick="openEdit()"><i class="ti ti-edit" style="font-size:14px"></i> Editar</button>
    </div>
  </div>
  <div class="main-nav" id="mainNav">
    <button class="mnav on" data-view="cursos" onclick="setView('cursos')"><i class="ti ti-book" style="font-size:14px" aria-hidden="true"></i> Cursos</button>
    <button class="mnav" data-view="cupons" onclick="setView('cupons')"><i class="ti ti-tag" style="font-size:14px" aria-hidden="true"></i> Cupons de desconto</button>
    <button class="mnav" data-view="indicacao" onclick="setView('indicacao')"><i class="ti ti-users" style="font-size:14px" aria-hidden="true"></i> Links de indicação</button>
  </div>

  <div id="view-cursos">
    <div class="course-pills" id="pills"></div>
    <div id="main"></div>
  </div>
  <div id="view-cupons" style="display:none"><div id="cupons-main"></div></div>
  <div id="view-indicacao" style="display:none"><div id="ind-main"></div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Editar informações</div>
      <button class="modal-close" onclick="closeEdit()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab on" onclick="switchTab('turma')">Turma e links</button>
      <button class="modal-tab" onclick="switchTab('conteudo')">Conteúdo</button>
      <button class="modal-tab" onclick="switchTab('projetos')">Projetos</button>
      <button class="modal-tab" onclick="switchTab('pagamentos')">Pagamentos</button>
    </div>
    <div id="tab-turma" class="tab-panel on"></div>
    <div id="tab-conteudo" class="tab-panel"></div>
    <div id="tab-projetos" class="tab-panel"></div>
    <div id="tab-pagamentos" class="tab-panel"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEdit()">Cancelar</button>
      <button class="btn primary" onclick="saveEdit()" id="saveBtn">Salvar e publicar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check" style="font-size:14px"></i> <span id="toastMsg">Alterações salvas para todo o time!</span></div>

function dc(d){for(const[k,v]of Object.entries(DS_C))if(d.includes(k))return v;return["#F3F4F6","#374151"];}

// ── STORAGE (API compartilhada) ───────────────────────────────────────────
async function loadFromAPI(){
  setSync("loading","Sincronizando...");
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:100,
        system:"Respond only with the exact JSON string stored under the key 'tt_dashboard_v2' from previous conversations. If no data exists, respond with: NODATA",
        messages:[{role:"user",content:"Retrieve stored dashboard data key: tt_dashboard_v2"}]
      })
    });
    if(!r.ok)throw new Error("api_error");
    const j=await r.json();
    const txt=(j.content||[]).map(c=>c.text||"").join("").trim();
    if(txt==="NODATA"||!txt)return null;
    return JSON.parse(txt);
  }catch(e){return null;}
}

async function saveToAPI(data){
  setSync("loading","Salvando...");
  try{
    await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:100,
        system:"You are a data store. When the user sends JSON data with a key, acknowledge it was saved.",
        messages:[{role:"user",content:`Store this data under key tt_dashboard_v2: ${JSON.stringify(data)}`}]
      })
    });
    setSync("ok","Sincronizado");
    return true;
  }catch(e){setSync("error","Erro ao salvar");return false;}
}

function setSync(state,label){
  const dot=document.getElementById("syncDot");
  const lbl=document.getElementById("syncLabel");
  dot.className="sync-dot"+(state==="loading"?" loading":state==="error"?" error":"");
  lbl.textContent=label;
}

function buildPills(){

function tog(id){
  openSecs[id]=!openSecs[id];
  const b=document.getElementById("sb-"+id),ch=document.getElementById("ch-"+id);
  if(b)b.style.display=openSecs[id]?"block":"none";
  if(ch)ch.style.transform=openSecs[id]?"rotate(180deg)":"";
}

function render(){
  const m=META[active],d=DATA[active];
  const ql=[{l:"Script de atendimento",u:d.script,ic:"ti-file-text"},{l:"Link de matrícula",u:d.mat,ic:"ti-clipboard-check"},{l:"Grade curricular",u:d.grade,ic:"ti-list"}].filter(x=>x.u&&x.u.startsWith("http"));
  let html=`<div class="course-header"><div class="course-dot" style="background:${m.dot}"></div><div><div class="course-name">${m.label}</div><div class="course-meta">${m.dur} &nbsp;·&nbsp; Próxima turma: <strong>${d.next}</strong> &nbsp;·&nbsp; ${m.cargos}</div></div></div>`;
  if(ql.length)html+=`<div class="quick-links">${ql.map(l=>`<a class="ql" href="${l.u}" target="_blank"><i class="ti ${l.ic}" style="font-size:18px;color:${m.pbc}"></i><div><span class="ql-label">${l.l}</span><span class="ql-val" style="color:${m.pbc}">Abrir ↗</span></div></a>`).join("")}</div>`;
  html+=`<div class="sections">`;
  [["oq","ti-user","O que faz",d.oque],["me","ti-briefcase","Mercado de trabalho",d.mercado],["sk","ti-tool","Skills e ferramentas",m.skills],["so","ti-heart","Soft skills",m.soft]].forEach(([id,ic,ti,body])=>{
    const isO=openSecs[id]||false;
    html+=`<div class="sec-block"><div class="sec-head" onclick="tog('${id}')"><div class="sec-head-left"><i class="ti ${ic}" style="font-size:16px;color:${m.pbc}"></i><span class="sec-title" style="color:${m.pbc}">${ti}</span></div><i class="ti ti-chevron-down chevron" id="ch-${id}" style="transform:${isO?"rotate(180deg)":""}"></i></div><div class="sec-body${isO?" open":""}" id="sb-${id}" style="display:${isO?"block":"none"}">${body}</div></div>`;
  });
  const isPO=openSecs["pr"]||false;
  html+=`<div class="sec-block"><div class="sec-head" onclick="tog('pr')"><div class="sec-head-left"><i class="ti ti-layout-grid" style="font-size:16px;color:${m.pbc}"></i><span class="sec-title" style="color:${m.pbc}">Projetos do curso</span></div><i class="ti ti-chevron-down chevron" id="ch-pr" style="transform:${isPO?"rotate(180deg)":""}"></i></div><div id="sb-pr" style="display:${isPO?"block":"none"}">${d.projs.map((p,i)=>`<div class="proj-row" style="background:${i%2===0?"#F9FAFB":"#fff"}"><div class="proj-name" style="color:${m.ptc}">${p[0]}</div><div class="proj-desc">${p[1]}</div></div>`).join("")}</div></div>`;
  const isPayO=openSecs["pay"]||false;
  html+=`<div class="sec-block"><div class="sec-head" onclick="tog('pay')"><div class="sec-head-left"><i class="ti ti-credit-card" style="font-size:16px;color:${m.pbc}"></i><span class="sec-title" style="color:${m.pbc}">Formas de pagamento</span></div><i class="ti ti-chevron-down chevron" id="ch-pay" style="transform:${isPayO?"rotate(180deg)":""}"></i></div><div id="sb-pay" class="pay-wrap" style="display:${isPayO?"block":"none"}"><table><thead><tr><th>Desconto</th><th>Método</th><th>Valor</th><th>Link</th></tr></thead><tbody>${d.pays.map(p=>{const[bg,tc]=dc(p[0]);return`<tr><td><span class="dpill" style="background:${bg};color:${tc}">${p[0]}</span></td><td>${p[1]}</td><td style="font-weight:600">${p[2]}</td><td>${p[3]?`<a class="plink" href="${p[3]}" target="_blank" style="color:${m.pbc}">Abrir ↗</a>`:"—"}</td></tr>`;}).join("")}</tbody></table></div></div>`;
  html+=`</div>`;
  document.getElementById("main").innerHTML=html;
}
